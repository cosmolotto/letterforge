name: Marketing Automation

on:
  schedule:
    # Daily tip tweet — 9am UTC
    - cron: '0 9 * * *'
    # Reddit monitor — 3x per day on weekdays
    - cron: '0 8 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 17 * * 1-5'
    # Weekly promo post — Monday 10am UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which bot to run'
        required: true
        default: 'reddit-monitor'
        type: choice
        options:
          - reddit-monitor
          - reddit-promo
          - twitter-tip
          - twitter-promo

jobs:
  twitter-daily-tip:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy
      - name: Post daily tip
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python marketing/twitter_bot.py --mode tip

  reddit-monitor:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install praw
      - name: Restore reply log
        uses: actions/cache@v4
        with:
          path: replied.json
          key: reddit-replied-${{ github.run_id }}
          restore-keys: reddit-replied-
      - name: Monitor and reply
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: python marketing/reddit_bot.py --mode monitor
      - name: Save reply log
        uses: actions/cache/save@v4
        with:
          path: replied.json
          key: reddit-replied-${{ github.run_id }}

  reddit-weekly-promo:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install praw
      - name: Restore promo log
        uses: actions/cache@v4
        with:
          path: promo_log.json
          key: reddit-promo-${{ github.run_id }}
          restore-keys: reddit-promo-
      - name: Post weekly promo
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: python marketing/reddit_bot.py --mode promo
      - name: Save promo log
        uses: actions/cache/save@v4
        with:
          path: promo_log.json
          key: reddit-promo-${{ github.run_id }}

  manual-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install praw tweepy
      - name: Run selected bot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BOT_MODE: ${{ inputs.mode }}
        run: |
          if [ "$BOT_MODE" = "reddit-monitor" ]; then
            python marketing/reddit_bot.py --mode monitor
          elif [ "$BOT_MODE" = "reddit-promo" ]; then
            python marketing/reddit_bot.py --mode promo
          elif [ "$BOT_MODE" = "twitter-tip" ]; then
            python marketing/twitter_bot.py --mode tip
          elif [ "$BOT_MODE" = "twitter-promo" ]; then
            python marketing/twitter_bot.py --mode promo
          fi
